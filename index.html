<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hebba Among Us - Millionaire Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #1a2a3a; overflow: hidden; touch-action: none; }
        #game-ui { position: absolute; top: 10px; right: 10px; width: 150px; pointer-events: none; }
        .task-list { background: rgba(0,0,0,0.6); padding: 10px; border-radius: 10px; color: gold; font-family: sans-serif; font-size: 12px; }
        #action-btn { 
            position: absolute; bottom: 30px; right: 30px; width: 80px; height: 80px; 
            background: rgba(241, 196, 15, 0.8); border-radius: 50%; border: 4px solid white;
            color: #1a2a3a; font-weight: bold; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="game-ui">
        <div class="task-list">
            <b>المهام المتبقية:</b>
            <div id="t1">📍 صب القهوة</div>
            <div id="t2">📍 تبخير المجلس</div>
        </div>
    </div>

    <div id="action-btn">استخدام</div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player;
        let joystick;
        let cursors;

        function preload() {
            // تحميل صورة الشخصية (أمونج أس)
            this.load.image('player', 'https://labs.phaser.io/assets/sprites/phaser-dude.png');
            // تحميل خريطة تخيلية للمجلس
            this.load.image('tiles', 'https://labs.phaser.io/assets/sets/objects/floor.png');
        }

        function create() {
            // إضافة أرضية المجلس
            for (let i = 0; i < 10; i++) {
                for (let j = 0; j < 10; j++) {
                    this.add.image(i * 128, j * 128, 'tiles');
                }
            }

            // إنشاء اللاعب
            player = this.physics.add.sprite(window.innerWidth/2, window.innerHeight/2, 'player');
            player.setCollideWorldBounds(true);
            player.setScale(2);

            // إعداد التحكم باللمس
            this.input.on('pointermove', function (pointer) {
                if (pointer.isDown) {
                    this.physics.moveToObject(player, pointer, 200);
                }
            }, this);

            this.input.on('pointerup', function () {
                player.body.setVelocity(0);
            });

            // الكاميرا تلحق اللاعب
            this.cameras.main.startFollow(player);
        }

        function update() {
            // هنا نضيف منطق إذا اقترب من مهمة يشتغل زر "استخدام"
        }
    </script>
</body>
</html>
