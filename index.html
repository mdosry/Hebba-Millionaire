<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hebba: Millionaire Among Us</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .hud { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border-left: 5px solid gold; pointer-events: auto; }
        .role-tag { color: gold; font-weight: bold; font-size: 20px; margin-bottom: 5px; }
        .task { color: white; font-size: 14px; margin: 5px 0; }
        #btn-action { 
            position: absolute; bottom: 40px; right: 40px; width: 90px; height: 90px; 
            background: rgba(255, 215, 0, 0.9); border: 5px solid #fff; border-radius: 50%; 
            color: #1a2a3a; font-weight: 800; display: flex; align-items: center; justify-content: center;
            pointer-events: auto; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="hud">
            <div id="my-role" class="role-tag">جاري التحديد...</div>
            <div id="task-1" class="task">📍 مهمة: ترتيب التكايات</div>
            <div id="task-2" class="task">📍 مهمة: تبخير المجلس</div>
        </div>
        <div id="btn-action" onclick="doAction()">استخدام</div>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        let player;
        let map;
        let isMillionaire = Math.random() < 0.2;
        const game = new Phaser.Game(config);

        function preload() {
            // صور الشخصيات ملونة (أمونج أس)
            this.load.spritesheet('crew', 'https://labs.phaser.io/assets/sprites/invader32x32x4.png', { frameWidth: 32, frameHeight: 32 });
        }

        function create() {
            // رسم المجلس (تخيلي برمجياً)
            const graphics = this.add.graphics();
            graphics.lineStyle(8, 0xffd700, 1);
            
            // غرفة 1: المجلس الرئيسي
            graphics.strokeRect(50, 50, 400, 300);
            this.add.text(60, 60, "الديوانية (Main)", { fill: '#ffd700' });

            // غرفة 2: المقلط
            graphics.strokeRect(450, 50, 300, 300);
            this.add.text(460, 60, "المقلط (Dining)", { fill: '#ffd700' });

            // إنشاء اللاعب (بشكل "أمونج أس" بسيط ملون)
            player = this.physics.add.sprite(200, 200, 'crew');
            player.setScale(2);
            if(isMillionaire) {
                player.setTint(0xff0000); // الأحمر هو المليونير
                document.getElementById('my-role').innerText = "الدور: مليونير 💰";
                document.getElementById('btn-action').innerText = "غدر";
            } else {
                player.setTint(0x00ff00); // الأخضر من النشامى
                document.getElementById('my-role').innerText = "الدور: من النشامى 👷‍♂️";
            }

            // الكاميرا
            this.cameras.main.startFollow(player);
            
            // تحكم اللمس
            this.input.on('pointermove', (pointer) => {
                if (pointer.isDown) {
                    this.physics.moveToObject(player, pointer, 200);
                }
            });

            this.input.on('pointerup', () => {
                player.body.setVelocity(0);
            });
        }

        function update() {
            // منع اللاعب من الخروج من حدود المجلس (بشكل مبسط)
            if(player.x < 50) player.x = 50;
            if(player.y < 50) player.y = 50;
        }

        function doAction() {
            if(isMillionaire) {
                alert("💰 تم نقل الثروة (القتل)! هربت من الشبهة.");
            } else {
                alert("📍 جاري ترتيب المجلس... تم إنهاء المهمة!");
                document.getElementById('task-1').style.textDecoration = "line-through";
                document.getElementById('task-1').style.opacity = "0.5";
            }
        }
    </script>
</body>
</html>
