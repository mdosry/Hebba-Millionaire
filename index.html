<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مليونير هبة - Among Us Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* بار المهام الأخضر */
        .task-card { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px; border-left: 6px solid #f1c40f; color: white; width: 220px; pointer-events: auto; }
        .progress-bg { background: #333; height: 12px; border-radius: 6px; margin: 10px 0; overflow: hidden; }
        .progress-fill { background: #27ae60; height: 100%; width: 0%; transition: 0.5s; box-shadow: 0 0 10px #2ecc71; }
        
        /* زر الاستخدام الفخم */
        #action-btn { 
            position: absolute; bottom: 30px; right: 30px; width: 100px; height: 100px; 
            background: radial-gradient(circle, #f1c40f, #d4ac0d); border: 4px solid #fff; 
            border-radius: 50%; color: #1a2a3a; font-weight: 900; font-size: 18px;
            display: flex; align-items: center; justify-content: center; pointer-events: auto;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.5); cursor: pointer;
        }
        #action-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="task-card">
            <div style="color:#f1c40f; font-weight:bold; margin-bottom:5px;">الدور: من النشامى 👷‍♂️</div>
            <div class="progress-bg"><div id="bar" class="progress-fill"></div></div>
            <div id="t1" style="font-size:13px;">📍 مهمة: صب القهوة</div>
            <div id="t2" style="font-size:13px;">📍 مهمة: تبخير المجلس</div>
        </div>
        <div id="action-btn" onclick="completeTask()">استخدام</div>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 1280, height: 720, // أبعاد العرض (HD)
            parent: 'game-container',
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player, cursors, wasd;
        let tasksDone = 0;

        function preload() {
            // خلفية الخيمة (نقش سدو/خشب)
            this.load.image('tent-floor', 'https://labs.phaser.io/assets/skies/space3.png'); // خلفية مؤقتة فخمة
            // شخصية واقعية تمشي (Sprite Sheet)
            this.load.spritesheet('hero', 'https://labs.phaser.io/assets/sprites/dude.png', { frameWidth: 32, frameHeight: 48 });
        }

        function create() {
            // رسم حدود الخيمة النجدية
            this.add.tileSprite(0, 0, 2560, 1440, 'tent-floor');
            
            // إضافة جدران الخيمة برمجياً
            let walls = this.physics.add.staticGroup();
            let rect = this.add.graphics();
            rect.lineStyle(10, 0x8b4513); // لون بني للخيمة
            rect.strokeRect(100, 100, 1000, 500);

            // إنشاء اللاعب
            player = this.physics.add.sprite(500, 300, 'hero');
            player.setScale(2);
            player.setCollideWorldBounds(true);

            // أنيميشن المشي
            this.anims.create({
                key: 'walk',
                frames: this.anims.generateFrameNumbers('hero', { start: 5, end: 8 }),
                frameRate: 10,
                repeat: -1
            });

            // تحكم البي سي
            cursors = this.input.keyboard.createCursorKeys();
            wasd = this.input.keyboard.addKeys('W,A,S,D');

            // الكاميرا تلحق اللاعب
            this.cameras.main.startFollow(player);
            this.cameras.main.setBounds(0, 0, 2000, 2000);
        }

        function update() {
            player.setVelocity(0);
            let speed = 200;

            // المشي بالأسهم أو WASD
            if (cursors.left.isDown || wasd.A.isDown) {
                player.setVelocityX(-speed);
                player.anims.play('walk', true);
                player.flipX = true;
            } else if (cursors.right.isDown || wasd.D.isDown) {
                player.setVelocityX(speed);
                player.anims.play('walk', true);
                player.flipX = false;
            }

            if (cursors.up.isDown || wasd.W.isDown) {
                player.setVelocityY(-speed);
                player.anims.play('walk', true);
            } else if (cursors.down.isDown || wasd.S.isDown) {
                player.setVelocityY(speed);
                player.anims.play('walk', true);
            }

            if (player.body.velocity.x === 0 && player.body.velocity.y === 0) {
                player.anims.stop();
            }
        }

        function completeTask() {
            if(tasksDone < 2) {
                tasksDone++;
                let fill = (tasksDone / 2) * 100;
                document.getElementById('bar').style.width = fill + "%";
                document.getElementById('t' + tasksDone).style.textDecoration = "line-through";
                document.getElementById('t' + tasksDone).style.opacity = "0.5";
                alert("📍 كفو! أنجزت المهمة في المجلس.");
            }
        }
    </script>
</body>
</html>
