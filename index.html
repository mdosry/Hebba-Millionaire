<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hebba Among Us - Millionaire Tent</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser3-rex-plugins@1.1.39/dist/rexvirtualjoystickplugin.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        /* تصميم واجهة المهام (HUD) */
        #game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .hud-container { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; border-left: 5px solid gold; color: white; pointer-events: auto; }
        .role { color: gold; font-weight: bold; font-size: 18px; }
        .task { font-size: 12px; margin: 3px 0; }
        .task-done { opacity: 0.5; text-decoration: line-through; }
        /* شريط المهام الأخضر (زي أمونج أس) */
        .progress-container { width: 100%; background: #333; height: 12px; border-radius: 6px; margin-top: 5px; overflow: hidden; }
        .progress-bar { background: #27ae60; height: 100%; width: 0%; transition: 0.5s; }
        /* زر الاستخدام للجوال (شفاف) */
        #mobile-action { position: absolute; bottom: 30px; right: 30px; width: 80px; height: 80px; background: rgba(241, 196, 15, 0.6); border: 4px solid rgba(255,255,255,0.8); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #1a2a3a; pointer-events: auto; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div class="hud-container">
            <div id="my-role" class="role">الدور: من النشامى 👷‍♂️</div>
            <div class="progress-container"><div id="main-progress" class="progress-bar"></div></div>
            <p id="task-1" class="task">📍 مهمة: ترتيب التكايات</p>
            <p id="task-2" class="task">📍 مهمة: تبخير المجلس</p>
        </div>
        <div id="mobile-action" onclick="doAction()">استخدام</div>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 960, // العرض الكلي
            height: 540, // الطول الكلي (16:9)
            backgroundColor: '#1a2a3a',
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player, joystick, cursors, keyE;
        let tasksDone = 0;
        const totalTasks = 2;

        function preload() {
            // تحميل صورة الخيمة النجدية
            this.load.image('tent', 'https://labs.phaser.io/assets/tests/background/pattern.png');
            // تحميل شخصية بالثوب والشماغ (يمشي) - صورة تجريبية
            this.load.spritesheet('dude', 'https://labs.phaser.io/assets/sprites/dude.png', { frameWidth: 32, frameHeight: 48 });
        }

        function create() {
            // رسم الخيمة (تكرار الصورة لخلفية أكبر)
            this.add.tileSprite(0, 0, config.width * 2, config.height * 2, 'tent').setOrigin(0);

            // إنشاء اللاعب
            player = this.physics.add.sprite(200, 200, 'dude');
            player.setCollideWorldBounds(true);
            player.setScale(1.5);
            player.setTint(0x00ff00); // لون أخضر للنشامى

            // إعداد تحكم البي سي (الأسهم)
            cursors = this.input.keyboard.createCursorKeys();
            // إعداد تحكم البي سي (W,A,S,D)
            this.input.keyboard.addKeys({ w: Phaser.Input.Keyboard.KeyCodes.W, a: Phaser.Input.Keyboard.KeyCodes.A, s: Phaser.Input.Keyboard.KeyCodes.S, d: Phaser.Input.Keyboard.KeyCodes.D, e: Phaser.Input.Keyboard.KeyCodes.E });

            // إعداد الكاميرا لتلحق اللاعب
            this.cameras.main.startFollow(player, true, 0.05, 0.05);

            // إعداد عصا التحكم للجوال (سحب من اليسار)
            this.plugins.get('rexvirtualjoystickplugin').add(this, {
                x: 80, y: config.height - 80, radius: 50,
                base: this.add.circle(0, 0, 50, 0x000000, 0.5),
                thumb: this.add.circle(0, 0, 25, 0xffd700, 0.8),
            }).on('update', (j) => {
                if (j.force) {
                    player.setVelocity(j.forceX * 2, j.forceY * 2);
                } else {
                    player.setVelocity(0);
                }
            });
        }

        function update() {
            // تحكم البي سي (الأسهم أو WASD)
            player.setVelocity(0);
            const speed = 160;

            if (cursors.left.isDown || this.input.keyboard.keys.a.isDown) player.setVelocityX(-speed);
            else if (cursors.right.isDown || this.input.keyboard.keys.d.isDown) player.setVelocityX(speed);

            if (cursors.up.isDown || this.input.keyboard.keys.w.isDown) player.setVelocityY(-speed);
            else if (cursors.down.isDown || this.input.keyboard.keys.s.isDown) player.setVelocityY(speed);

            // زر الاستخدام للبي سي (Space أو E)
            if (Phaser.Input.Keyboard.JustDown(cursors.space) || Phaser.Input.Keyboard.JustDown(this.input.keyboard.keys.e)) {
                doAction();
            }
        }

        // منطق المهام
        function doAction() {
            if (tasksDone < totalTasks) {
                alert("📍 تمت مهمة ترتيب التكايات في الخيمة النجدية!");
                document.getElementById('task-' + (tasksDone+1)).classList.add('task-done');
                tasksDone++;
                document.getElementById('main-progress').style.width = (tasksDone / totalTasks * 100) + '%';
            } else {
                alert("✅ خلصت كل المهام! النشامى فازوا!");
            }
        }
    </script>
</body>
</html>
